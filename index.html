<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary Meta -->
    <title>FoE Optimizer – Free Tool for Forge of Empires</title>
    <meta name="description" content="Free Forge of Empires web app: building database, inventory imports, efficiency scores, and a powerful Inventory Optimizer.">
    <meta name="author" content="Sdrushi">
    <meta name="application-name" content="FoE Optimizer">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="color-scheme" content="dark light">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <!-- iOS / Mobile PWA: abilita la modalità standalone "app" quando il sito
         viene installato dalla home di iPhone/iPad (su Android lo gestisce già
         il manifest). status-bar-style "black" si abbina al tema scuro e tiene
         il contenuto sotto la status bar (niente sovrapposizioni). -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="FoE Optimizer">

    <!-- Canonical -->
    <link rel="canonical" href="https://foe-optimizer.com/">

    <!-- Performance hints -->
    <meta name="format-detection" content="telephone=no">

    <!-- Open Graph -->
    <meta property="og:title" content="FoE Optimizer – Free Tool for Forge of Empires">
    <meta property="og:description" content="Optimize builds, inventory combos, and city efficiency with real-era stats and smart calculations.">
    <meta property="og:url" content="https://foe-optimizer.com/">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_US">
    <meta property="og:locale:alternate" content="it_IT">
    <meta property="og:site_name" content="FoE Optimizer">
    <meta property="og:image" content="https://foe-optimizer.com/og-image.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="FoE Optimizer – Free Tool for Forge of Empires">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="FoE Optimizer – Free Tool for Forge of Empires">
    <meta name="twitter:description" content="Optimize builds, inventory combos, and city efficiency with real-era stats.">
    <meta name="twitter:image" content="https://foe-optimizer.com/og-image.png">
    <meta name="twitter:image:alt" content="FoE Optimizer – Free Tool for Forge of Empires">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FoE Optimizer",
      "url": "https://foe-optimizer.com/",
      "description": "Free tool for Forge of Empires. Optimize builds, inventory combos, and city efficiency with real-era stats and smart calculations.",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Web",
      "browserRequirements": "Requires JavaScript. Requires HTML5.",
      "inLanguage": ["en", "it"],
      "isAccessibleForFree": true,
      "creator": {
        "@type": "Person",
        "name": "Sdrushi"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Forge of Empires building database",
        "Inventory import and analysis",
        "Building efficiency scoring",
        "Inventory Optimizer",
        "City efficiency calculations"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
